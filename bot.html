<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Bot</title>
    <!-- DaisyUI & Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#E5007D",
              "primary-focus": "#c4006a",
              secondary: "#f6d5e6",
            },
            fontFamily: {
              sans: ["Calibri", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      html,
      html[data-theme],
      html[data-theme="light"],
      html[data-theme="dark"],
      body {
        background: transparent !important;
        background-color: transparent !important;
        overflow: hidden;
        margin: 0 !important;
        padding: 0 !important;
      }

      /* Override every possible DaisyUI/Tailwind background source */
      :root {
        --b1: transparent !important;
        background: transparent !important;
        background-color: transparent !important;
      }

      [data-theme],
      [data-theme="light"],
      [data-theme="dark"] {
        background: transparent !important;
        background-color: transparent !important;
      }

      /* Glass Panel for Chat Window */
      .glass-panel {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      /* Chatbot Styles */
      .chat-bubble-primary {
        color: white;
      }

      .chat-widget {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: flex-end;
        padding: 1rem;
        box-sizing: border-box;
        background: transparent;
      }

      .chat-window {
        width: 100%;
        height: 100%;
        max-height: 500px; /* גובה מקסימלי לחלון הצ'אט */
        display: none;
        flex-direction: column;
        margin-bottom: 1rem;
      }

      /* Smooth animations */
      .chat-bubble {
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Scrollbar styling */
      #chat-messages::-webkit-scrollbar {
        width: 6px;
      }

      #chat-messages::-webkit-scrollbar-track {
        background: transparent;
      }

      #chat-messages::-webkit-scrollbar-thumb {
        background: rgba(229, 0, 125, 0.3);
        border-radius: 3px;
      }

      #chat-messages::-webkit-scrollbar-thumb:hover {
        background: rgba(229, 0, 125, 0.5);
      }
    </style>
  </head>
  <body>
    <script>
      // Strip any theme/background from html+body immediately
      var _h = document.documentElement;
      var _b = document.body || document.getElementsByTagName('body')[0];
      _h.removeAttribute('data-theme');
      _h.style.cssText += ';background:transparent!important;background-color:transparent!important;';
      if (_b) _b.style.cssText += ';background:transparent!important;background-color:transparent!important;';
      // Re-apply after any framework sets it
      var _obs = new MutationObserver(function() {
        _h.style.cssText += ';background:transparent!important;background-color:transparent!important;';
      });
      _obs.observe(_h, { attributes: true, attributeFilter: ['data-theme', 'style'] });
      // Stop observing after 3 seconds
      setTimeout(function() { _obs.disconnect(); }, 3000);
    </script>
    <div class="chat-widget font-sans">
      <!-- Chat Window -->
      <div
        id="chat-window"
        class="chat-window shadow-2xl rounded-2xl border border-base-300 overflow-hidden glass-panel transition-all duration-300 origin-bottom-left transform scale-95 opacity-0"
      >
        <!-- Header -->
        <div
          class="bg-primary text-white p-4 flex justify-between items-center shadow-md"
        >
          <div class="flex items-center gap-2">
            <i class="fa-solid fa-robot text-2xl"></i>
            <div>
              <h3 class="font-bold text-lg leading-none">העוזר החכם</h3>
              <span class="text-xs opacity-80">זמין לעזרה</span>
            </div>
          </div>
          <button
            onclick="toggleChat()"
            class="btn btn-sm btn-circle btn-ghost text-white hover:bg-white/20"
          >
            <i class="fa-solid fa-times"></i>
          </button>
        </div>

        <!-- Messages Area -->
        <div
          id="chat-messages"
          class="flex-1 p-4 overflow-y-auto bg-base-200/50 space-y-4"
        >
          <div class="chat chat-start">
            <div class="chat-image avatar">
              <div class="w-10 rounded-full bg-primary/10 p-2">
                <img
                  src="./assets/logo.png"
                  alt="Bot"
                  onerror="
                    this.src =
                      'https://cdn-icons-png.flaticon.com/512/4712/4712027.png'
                  "
                />
              </div>
            </div>
            <div class="chat-bubble chat-bubble-primary">
              היי! 👋 אני העוזר החכם של מרכז המדריכים.<br><br>
              <strong>אני יכול לעזור לך:</strong><br>
              ✓ למצוא מדריכים רלוונטיים<br>
              ✓ להבין תהליכים ונהלים<br>
              ✓ לפתור שגיאות ובעיות<br>
              ✓ לענות על שאלות כלליות<br><br>
              <small class="opacity-80">פשוט שאל אותי כל שאלה, לדוגמה:<br>
              "איך עושים ניוד?" או "מה זה שגיאה 500?"</small>
            </div>
          </div>
        </div>

        <!-- Input Area -->
        <div class="p-3 bg-base-100 border-t border-base-300">
          <!-- Quick Suggestions -->
          <div id="quick-suggestions" class="mb-2 flex flex-wrap gap-1">
            <button onclick="sendQuickMessage('איך עושים ניוד?')" class="btn btn-xs btn-outline">ניוד</button>
            <button onclick="sendQuickMessage('איך מפעילים סים?')" class="btn btn-xs btn-outline">הפעלת סים</button>
            <button onclick="sendQuickMessage('שגיאות נפוצות')" class="btn btn-xs btn-outline">שגיאות</button>
            <button onclick="sendQuickMessage('חבילות חו\"ל')" class="btn btn-xs btn-outline">חו\"ל</button>
          </div>
          <div class="flex gap-2">
            <input
              type="text"
              id="chat-input"
              placeholder="כתוב הודעה..."
              class="input input-bordered w-full focus:outline-none focus:border-primary"
              onkeypress="handleChatKey(event);"
            />
            <button onclick="sendMessage()" class="btn btn-primary btn-square">
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Toggle Button -->
      <button
        onclick="toggleChat()"
        class="btn btn-circle btn-primary btn-lg shadow-lg hover:scale-110 transition-transform"
      >
        <i class="fa-solid fa-comment-dots text-2xl"></i>
      </button>
    </div>

    <script>
      const chatWindow = document.getElementById("chat-window");
      const chatMessages = document.getElementById("chat-messages");
      const chatInput = document.getElementById("chat-input");
      let chatIndex = [];

      // גישה לחלון האב (index.html)
      const parentWindow = window.parent;
      const parentDoc = parentWindow.document;

      function initChatIndex() {
        // בדיקה אם המידע קיים בחלון האב
        if (!parentWindow.guides) {
          console.warn("Guides data not found in parent window.");
          return;
        }

        // סריקת התוכן מתוך חלון האב
        chatIndex = parentWindow.guides.map((guide) => {
          const el = parentDoc.getElementById(guide.id);
          const rawText = el ? el.innerText : "";
          const searchableContent = rawText.replace(/\s+/g, " ").toLowerCase();

          return {
            id: guide.id,
            title: guide.title,
            category: guide.category,
            content: searchableContent,
            rawContent: rawText,
            keywords: guide.title.split(" ").concat(guide.category.split(" ")),
          };
        });
      }

      // אתחול בטעינה
      window.addEventListener("load", () => {
        initChatIndex();
        loadChatHistory();
      });

      function loadChatHistory() {
        const history = localStorage.getItem("chatHistory");
        if (history) {
          try {
            const messages = JSON.parse(history);
            // Load last 5 messages only
            const recentMessages = messages.slice(-5);
            recentMessages.forEach(msg => {
              addMessage(msg.text, msg.sender, msg.linkId, false);
            });
          } catch (e) {
            console.error("Failed to load chat history", e);
          }
        }
      }

      function saveChatHistory(text, sender, linkId = null) {
        try {
          const history = localStorage.getItem("chatHistory");
          const messages = history ? JSON.parse(history) : [];
          messages.push({ text, sender, linkId, timestamp: Date.now() });
          // Keep only last 20 messages
          const recentMessages = messages.slice(-20);
          localStorage.setItem("chatHistory", JSON.stringify(recentMessages));
        } catch (e) {
          console.error("Failed to save chat history", e);
        }
      }

      function toggleChat() {
        const iframe = parentDoc.getElementById("bot-iframe");

        if (chatWindow.style.display === "flex") {
          // סגירה
          chatWindow.classList.remove("opacity-100", "scale-100");
          chatWindow.classList.add("opacity-0", "scale-95");
          setTimeout(() => {
            chatWindow.style.display = "none";
            // הקטנת ה-iframe לגודל הכפתור בלבד
            if (iframe) {
              iframe.style.width = "100px";
              iframe.style.height = "100px";
            }
          }, 300);
        } else {
          // פתיחה
          // הגדלת ה-iframe כדי להכיל את החלון
          if (iframe) {
            iframe.style.width = "400px";
            iframe.style.height = "600px";
          }

          chatWindow.style.display = "flex";
          setTimeout(() => {
            chatWindow.classList.remove("opacity-0", "scale-95");
            chatWindow.classList.add("opacity-100", "scale-100");
            chatInput.focus();
          }, 10);
        }
      }

      function handleChatKey(e) {
        if (e.key === "Enter") sendMessage();
      }

      function sendQuickMessage(text) {
        chatInput.value = text;
        sendMessage();
      }

      function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        // User Message
        addMessage(text, "user");
        chatInput.value = "";
        
        // Hide quick suggestions after first message
        const suggestions = document.getElementById("quick-suggestions");
        if (suggestions && suggestions.children.length > 0) {
          suggestions.style.display = "none";
        }
        
        showTypingIndicator();
        setTimeout(
          () => {
            removeTypingIndicator();
            const response = generateResponse(text);
            addMessage(response.text, "bot", response.linkId);
            
            // Update suggestions based on context
            updateQuickSuggestions(response);
          },
          600 + Math.random() * 500,
        ); // Random delay 0.6s - 1.1s
      }

      function updateQuickSuggestions(lastResponse) {
        const suggestions = document.getElementById("quick-suggestions");
        if (!suggestions) return;
        
        // Show suggestions again with contextual options
        suggestions.style.display = "flex";
        
        const contextualSuggestions = [
          { text: "עוד שאלות על הנושא", query: lastResponse.linkId ? chatIndex.find(i => i.id === lastResponse.linkId)?.category : null },
          { text: "חזרה לתפריט הראשי", query: null },
        ];
        
        // Keep it simple - don't overwhelm
        suggestions.innerHTML = `
          <button onclick="sendQuickMessage('מה עוד אפשר לשאול?')" class="btn btn-xs btn-outline">מה עוד?</button>
          <button onclick="sendQuickMessage('תודה')" class="btn btn-xs btn-outline">תודה</button>
        `;
      }

      function addMessage(text, sender, linkId = null, saveToHistory = true) {
        const div = document.createElement("div");
        div.className = `chat ${sender === "user" ? "chat-end" : "chat-start"}`;

        let contentHtml = text;
        if (linkId) {
          contentHtml += `<br><button class="btn btn-xs btn-outline mt-2 text-white border-white/70 hover:bg-white hover:text-primary" onclick="window.parent.showSection('${linkId}')">עבור למדריך <i class="fa-solid fa-arrow-left mr-1"></i></button>`;
        }

        div.innerHTML = `
                <div class="chat-bubble ${sender === "user" ? "chat-bubble-secondary" : "chat-bubble-primary"}">
                    ${contentHtml}
                </div>
            `;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        
        if (saveToHistory) {
          saveChatHistory(text, sender, linkId);
        }
      }

      function showTypingIndicator() {
        const div = document.createElement("div");
        div.id = "typing-indicator";
        div.className = "chat chat-start";
        div.innerHTML = `
          <div class="chat-image avatar">
            <div class="w-10 rounded-full bg-primary/10 p-2">
              <img
                src="./assets/logo.png"
                alt="Bot"
                onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712027.png'"
              />
            </div>
          </div>
          <div class="chat-bubble chat-bubble-primary opacity-70">
            <div class="flex gap-1">
              <span class="inline-block w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay: 0s"></span>
              <span class="inline-block w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
              <span class="inline-block w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
            </div>
          </div>
        `;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function removeTypingIndicator() {
        const el = document.getElementById("typing-indicator");
        if (el) el.remove();
      }

      function generateResponse(input) {
        const synonymMap = {
          תקלה: ["שגיאה", "בעיה", "תקלות", "בעיות", "כשל", "נכשל"],
          ניוד: ["לנייד", "ניודים", "העברה", "מעבר", "החלפה"],
          חשבונית: ["חשבוניות", "חיוב", "תשלום", "חשבון"],
          הפעלה: ["אקטיבציה", "להפעיל", "הפעלת", "הדלקה"],
          סים: ["sim", "כרטיס", "esim", "סימים"],
          הזמנה: ["הזמנות", "הצטרפות", "רכישה"],
          חוזה: ["חוזים", "חתימה", "חתימות"],
          פריפייד: ["prepaid", "טעינה", "הטענה"],
          חול: ["חו\"ל", "נדידה", "נסיעה", "חבילה"],
          מנוי: ["מנויים", "לקוח", "תיקייה"],
        };

        const lowerInput = input.toLowerCase();
        
        // Small Talk & Greetings - בדיקות מדויקות יותר
        if (lowerInput.match(/^(היי|שלום|בוקר טוב|צהריים טובים|ערב טוב|אהלן|הלו|מה נשמע)\s*[?!.]?$/)) 
          return { text: `שלום! 👋 אני העוזר החכם של מרכז המדריכים. אפשר לשאול אותי כל שאלה על התהליכים והמערכות שלנו.` };
        if (lowerInput.match(/^(מה שלומך|מה קורה|איך אתה|מה המצב)\s*[?!.]?$/)) 
          return { text: "שלומי מצוין! 😊 אני כאן כדי לעזור לך למצוא את המידע שאתה צריך." };
        if (lowerInput.match(/^(תודה|תודה רבה|רבה|אחלה|מעולה|יפה|תודה רבה רבה)\s*[?!.]?$/)) 
          return { text: "בכיף! 👍 שמח שיכולתי לעזור. אם יש עוד שאלות - אני פה!" };
        if (lowerInput.match(/^(עזרה|מה אתה יכול|מה אפשר|מה תוכל)\s*[?!.]?$/)) 
          return { text: "אני יכול לעזור לך למצוא מדריכים על: הזמנות, הפעלת סים, ניוד, חוזים, פריפייד, חבילות חו\"ל, אזור אישי, MIND, RLT ועוד. פשוט שאל!" };

        // Intent Detection - זיהוי כוונות
        const intent = detectIntent(lowerInput);
        
        // Process input with synonyms
        let processedInput = lowerInput;
        for (const [key, synonyms] of Object.entries(synonymMap)) {
          synonyms.forEach(syn => {
            const regex = new RegExp(`\\b${syn}\\b`, "gi");
            processedInput = processedInput.replace(regex, key);
          });
        }

        // Extract keywords
        const stopWords = ["איך", "אני", "יכול", "לעשות", "מה", "זה", "את", "של", "על", "עם", "אפשר", "צריך", "רוצה", "להיות", "יש", "אין", "כל", "או", "גם"];
        const words = processedInput.split(/\s+/).filter(w => w.trim().length > 1 && !stopWords.includes(w));
        
        if (words.length === 0) 
          return { text: "לא הבנתי את השאלה. אפשר לנסח אותה אחרת? לדוגמה: 'איך עושים ניוד?' או 'מה זה שגיאה 500?'" };

        // Advanced Search with multiple strategies
        const results = searchWithMultipleStrategies(words, lowerInput, intent);
        
        if (results.length === 0) {
          return generateNoResultsResponse(lowerInput, words);
        }

        const bestMatch = results[0];
        
        // Generate contextual response
        return generateContextualResponse(bestMatch, lowerInput, results);
      }

      function detectIntent(input) {
        if (input.match(/(איך|כיצד|דרך|תהליך|שלבים)/)) return "how-to";
        if (input.match(/(מה זה|מהו|הגדרה|הסבר|פירוש)/)) return "definition";
        if (input.match(/(שגיאה|תקלה|בעיה|כשל|לא עובד|נכשל)/)) return "error";
        if (input.match(/(איפה|היכן|מיקום|למצוא|לחפש)/)) return "location";
        if (input.match(/(מתי|זמן|כמה זמן|משך)/)) return "timing";
        if (input.match(/(למה|מדוע|סיבה|הסיבה)/)) return "reason";
        return "general";
      }

      function searchWithMultipleStrategies(words, fullInput, intent) {
        const results = [];
        
        chatIndex.forEach((item) => {
          let score = 0;
          let matchDetails = { exact: 0, partial: 0, context: 0 };
          
          // Strategy 1: Exact phrase matching
          if (item.content.includes(fullInput)) {
            score += 100;
            matchDetails.exact += 1;
          }
          
          // Strategy 2: Title matching (highest priority)
          words.forEach((word) => {
            const titleLower = item.title.toLowerCase();
            if (titleLower === word) {
              score += 50;
              matchDetails.exact += 1;
            } else if (titleLower.includes(word)) {
              score += 25;
              matchDetails.partial += 1;
            }
          });
          
          // Strategy 3: Category matching
          words.forEach((word) => {
            const categoryLower = item.category.toLowerCase();
            if (categoryLower.includes(word)) {
              score += 15;
              matchDetails.context += 1;
            }
          });
          
          // Strategy 4: Content matching with proximity bonus
          words.forEach((word, idx) => {
            if (item.content.includes(word)) {
              score += 3;
              // Bonus for words appearing close together
              if (idx > 0 && item.content.includes(words[idx-1])) {
                const pos1 = item.content.indexOf(words[idx-1]);
                const pos2 = item.content.indexOf(word);
                if (Math.abs(pos1 - pos2) < 50) score += 5;
              }
            }
          });
          
          // Strategy 5: Fuzzy matching for typos
          words.forEach((word) => {
            if (word.length > 3) {
              const fuzzyMatches = findFuzzyMatches(word, item.content);
              score += fuzzyMatches * 2;
            }
          });
          
          // Strategy 6: Intent-based boosting
          if (intent === "error" && item.title.includes("שגיאה")) score += 20;
          if (intent === "how-to" && (item.title.includes("איך") || item.content.includes("שלב"))) score += 15;
          
          if (score > 0) {
            results.push({ ...item, score, matchDetails });
          }
        });
        
        // Sort by score descending
        return results.sort((a, b) => b.score - a.score);
      }

      function findFuzzyMatches(word, text) {
        let matches = 0;
        const words = text.split(/\s+/);
        words.forEach(textWord => {
          if (textWord.length > 2 && levenshteinDistance(word, textWord) <= 2) {
            matches++;
          }
        });
        return matches;
      }

      function levenshteinDistance(str1, str2) {
        const matrix = [];
        for (let i = 0; i <= str2.length; i++) {
          matrix[i] = [i];
        }
        for (let j = 0; j <= str1.length; j++) {
          matrix[0][j] = j;
        }
        for (let i = 1; i <= str2.length; i++) {
          for (let j = 1; j <= str1.length; j++) {
            if (str2.charAt(i - 1) === str1.charAt(j - 1)) {
              matrix[i][j] = matrix[i - 1][j - 1];
            } else {
              matrix[i][j] = Math.min(
                matrix[i - 1][j - 1] + 1,
                matrix[i][j - 1] + 1,
                matrix[i - 1][j] + 1
              );
            }
          }
        }
        return matrix[str2.length][str1.length];
      }

      function generateContextualResponse(match, input, allResults) {
        let responseText = "";
        
        // Extract relevant snippet from content
        const snippet = extractRelevantSnippet(match.rawContent, input);
        
        if (match.score > 50) {
          responseText = `מצאתי בדיוק את מה שחיפשת! 🎯<br><br>`;
          responseText += `<strong>${match.title}</strong><br>`;
          if (snippet) {
            responseText += `<div class="text-sm opacity-90 mt-2 p-2 bg-white/20 rounded">${snippet}</div>`;
          }
        } else if (match.score > 20) {
          responseText = `נראה שזה יכול לעזור לך:<br><br>`;
          responseText += `<strong>${match.title}</strong> (${match.category})<br>`;
          if (snippet) {
            responseText += `<div class="text-sm opacity-90 mt-2">${snippet}</div>`;
          }
        } else {
          responseText = `מצאתי משהו שאולי קשור:<br><br>`;
          responseText += `<strong>${match.title}</strong>`;
        }
        
        // Add alternative suggestions if available
        if (allResults.length > 1 && match.score < 50) {
          responseText += `<br><br><small class="opacity-75">💡 אולי גם מעניין: ${allResults[1].title}</small>`;
        }
        
        return { text: responseText, linkId: match.id };
      }

      function extractRelevantSnippet(content, query) {
        const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);
        const sentences = content.split(/[.!?]\s+/);
        
        let bestSentence = "";
        let maxMatches = 0;
        
        sentences.forEach(sentence => {
          const sentenceLower = sentence.toLowerCase();
          let matches = 0;
          words.forEach(word => {
            if (sentenceLower.includes(word)) matches++;
          });
          if (matches > maxMatches && sentence.length > 20 && sentence.length < 200) {
            maxMatches = matches;
            bestSentence = sentence.trim();
          }
        });
        
        if (bestSentence && maxMatches > 0) {
          return bestSentence.substring(0, 150) + (bestSentence.length > 150 ? "..." : "");
        }
        return null;
      }

      function generateNoResultsResponse(input, words) {
        // Try to suggest related topics
        const suggestions = [];
        const categories = [...new Set(chatIndex.map(item => item.category))];
        
        // Find categories that might be relevant
        categories.forEach(cat => {
          words.forEach(word => {
            if (cat.toLowerCase().includes(word) && !suggestions.includes(cat)) {
              suggestions.push(cat);
            }
          });
        });
        
        let response = "לא מצאתי תוכן מדויק שמתאים לשאלה שלך. 🤔<br><br>";
        
        if (suggestions.length > 0) {
          response += `אולי תרצה לחפש במדריכים של: <strong>${suggestions.join(", ")}</strong>?<br><br>`;
        }
        
        response += `💡 <strong>טיפים לחיפוש טוב יותר:</strong><br>`;
        response += `• נסה מילים אחרות (למשל: "ניוד" במקום "העברת מספר")<br>`;
        response += `• השתמש במילות מפתח ספציפיות<br>`;
        response += `• שאל שאלה ישירה (למשל: "איך עושים הפעלת סים?")<br><br>`;
        response += `אפשר גם להשתמש בחיפוש הראשי למעלה 🔍`;
        
        return { text: response };
      }
    </script>
